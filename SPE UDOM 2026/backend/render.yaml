services:
  - type: web
    name: spe-udom-backend
    env: python
    rootDir: SPE UDOM 2026/backend
    buildCommand: ./build.sh
    startCommand: python manage.py migrate && python create_superuser.py && gunicorn backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: spe-udom-db
          property: connectionString
        sync: true

databases:
  - name: spe-udom-db
    databaseName: spe_udom
    user: spe_udom
