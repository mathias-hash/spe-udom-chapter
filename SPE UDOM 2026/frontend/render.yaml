services:
  - type: static_site
    name: spe-udom-frontend
    rootDir: SPE UDOM 2026/frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
